<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datos Health — PriorityPulse Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>

/* ═══════════════════════════════════════════
   1. RESET
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button { font: inherit; cursor: pointer; border: none; background: none; }
svg { display: block; flex-shrink: 0; }

/* ═══════════════════════════════════════════
   2. DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --brand-purple:         #6D60F3;
  --brand-purple-light:   #A07AFC;
  --brand-purple-dark:    #2D1A4E;
  --brand-purple-tint:    #F7F5FF;
  --brand-lavender-light: #F7F5FF;
  --brand-lavender-mid:   #EAE5FD;
  --brand-cta:            #6D2D90;
  --brand-green:          #34A853;
  --brand-red:            #C0392B;

  --color-bg-page:        #F5F3FA;
  --color-bg-nav:         #2D1A4E;
  --color-bg-surface:     #FFFFFF;
  --color-bg-hover:       #F0EDFB;
  --color-bg-selected:    #E8E3F8;

  --color-text-primary:   #2D1A4E;
  --color-text-secondary: #4A4763;
  --color-text-tertiary:  #9492A8;
  --color-text-inverse:   #FFFFFF;

  --color-border-default: #E5E0F0;
  --color-border-strong:  #C5C2D8;

  --color-accent:         #6D2D90;
  --color-accent-hover:   #5A2278;

  --color-risk-high:      #C0392B;
  --color-risk-high-tint: #FEF2F2;
  --color-risk-medium:    #D97706;
  --color-risk-medium-tint:#FFFBEB;
  --color-risk-low:       #34A853;
  --color-risk-low-tint:  #F0FDF4;
  --color-risk-low-text:  #FFFFFF;

  --color-signal-ok:       #34A853;
  --color-signal-concern:  #F59E0B;
  --color-signal-data:     #6D60F3;
  --color-signal-silent:   #C0392B;
  --color-signal-empty:    #E5E0F0;

  --color-silent:          #C0392B;
  --color-silent-tint:     #FEF2F2;
  --color-silent-border:   #FECACA;
  --color-silent-text:     #991B1B;

  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

  --nav-h:   56px;
  --stat-h:  80px;
  --panel-w: 400px;
  --row-h:   72px;
  --fixed-h: calc(var(--nav-h) + var(--stat-h));

  --r-xs:   4px;
  --r-sm:   6px;
  --r-md:   10px;
  --r-lg:   14px;
  --r-full: 9999px;

  --shadow-sm:    0 1px 3px rgba(45,26,78,.06), 0 1px 2px rgba(45,26,78,.04);
  --shadow-md:    0 4px 12px rgba(45,26,78,.08), 0 2px 4px rgba(45,26,78,.04);
  --shadow-panel: -1px 0 0 #E5E0F0, -8px 0 32px rgba(45,26,78,.09);
  --shadow-focus: 0 0 0 3px rgba(109,96,243,.25);

  --t-fast:   150ms cubic-bezier(.4,0,.2,1);
  --t-normal: 220ms cubic-bezier(0,0,.2,1);
}

/* ═══════════════════════════════════════════
   3. BASE
═══════════════════════════════════════════ */
html, body {
  height: 100%;
  font-family: var(--font);
  font-size: 14px;
  color: var(--color-text-primary);
  background: var(--color-bg-page);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ═══════════════════════════════════════════
   4. LAYOUT
═══════════════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#nav {
  height: var(--nav-h);
  flex-shrink: 0;
  background: var(--color-bg-nav);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  border-bottom: 1px solid rgba(255,255,255,.07);
  position: relative;
  z-index: 200;
}

#stat-bar {
  height: var(--stat-h);
  flex-shrink: 0;
  background: var(--color-bg-surface);
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid var(--color-border-default);
  position: relative;
  z-index: 150;
}

#main-content {
  flex: 1;
  overflow: hidden;
  position: relative;
  display: flex;
}

#queue-column {
  flex: 1;
  min-width: 0;
  overflow-y: auto;
  overflow-x: hidden;
  transition: padding-right var(--t-normal);
  background: var(--color-bg-page);
}

#queue-column.panel-open {
  padding-right: var(--panel-w);
}

/* ═══════════════════════════════════════════
   5. NAV BAR
═══════════════════════════════════════════ */
.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.nav-icon-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-brand {
  font-size: 17px;
  font-weight: 700;
  color: #FFFFFF;
  letter-spacing: -0.03em;
}

.nav-health {
  font-size: 13px;
  font-weight: 400;
  color: rgba(255,255,255,.45);
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.nav-bell {
  color: rgba(255,255,255,.4);
  cursor: pointer;
  padding: 4px;
  border-radius: var(--r-sm);
  transition: color var(--t-fast);
}
.nav-bell:hover { color: rgba(255,255,255,.7); }

.nav-user {
  display: flex;
  align-items: center;
  gap: 9px;
}

.nav-user-info { text-align: right; }

.nav-user-name {
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,.9);
  line-height: 1.2;
}

.nav-user-role {
  font-size: 11px;
  color: rgba(255,255,255,.4);
  letter-spacing: .02em;
}

.nav-avatar {
  width: 32px;
  height: 32px;
  border-radius: var(--r-full);
  background: linear-gradient(135deg, #6D60F3 0%, #A07AFC 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: #FFFFFF;
  flex-shrink: 0;
}

.nav-feature-badge {
  font-size: 10px;
  font-weight: 700;
  color: #FFFFFF;
  background: var(--brand-cta);
  padding: 3px 8px;
  border-radius: var(--r-full);
  letter-spacing: .04em;
  margin-left: 8px;
}

/* ═══════════════════════════════════════════
   6. STAT BAR
═══════════════════════════════════════════ */
.kpi-tile {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 28px;
  border-right: 1px solid var(--color-border-default);
  transition: background var(--t-fast);
}

.kpi-tile:last-child { border-right: none; }

.kpi-value {
  font-size: 26px;
  font-weight: 700;
  line-height: 1.1;
  color: var(--color-text-primary);
  letter-spacing: -0.03em;
}

.kpi-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--color-text-tertiary);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-top: 3px;
}

.kpi-tile--alert .kpi-value { color: var(--color-silent); }
.kpi-tile--alert { background: var(--color-silent-tint); }

.kpi-tile--warn .kpi-value { color: var(--color-risk-medium); }
.kpi-tile--warn { background: var(--color-risk-medium-tint); }

/* ═══════════════════════════════════════════
   7. QUEUE
═══════════════════════════════════════════ */
.queue-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--color-bg-page);
  padding: 16px 24px 12px;
  border-bottom: 1px solid var(--color-border-default);
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}

.queue-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--color-text-primary);
}

.queue-date {
  font-size: 12px;
  color: var(--color-text-tertiary);
  margin-top: 1px;
}

.queue-title-wrap {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.queue-sort {
  font-size: 11px;
  font-weight: 500;
  color: var(--color-text-tertiary);
  letter-spacing: .02em;
}

/* ═══════════════════════════════════════════
   8. PATIENT ROW
═══════════════════════════════════════════ */
.patient-row {
  display: grid;
  grid-template-columns: 40px 1fr auto;
  align-items: center;
  gap: 0 12px;
  padding: 0 20px 0 0;
  padding-left: calc(12px + 4px);
  height: var(--row-h);
  border-left: 4px solid transparent;
  border-bottom: 1px solid var(--color-border-default);
  cursor: pointer;
  background: var(--color-bg-surface);
  transition: background var(--t-fast), border-color var(--t-fast);
  user-select: none;
  opacity: 1;
  animation: row-in .3s ease-out forwards;
}

.patient-row:last-child { border-bottom: none; }
.patient-row:hover { background: var(--color-bg-hover); }

.patient-row.row-selected {
  background: var(--color-bg-selected);
  border-left-color: var(--brand-purple);
}

.patient-row.row-silent { border-left-color: var(--color-silent); }
.patient-row.row-silent.row-selected { border-left-color: var(--color-silent); }

.patient-avatar {
  width: 36px;
  height: 36px;
  border-radius: var(--r-full);
  background: var(--brand-lavender-mid);
  color: var(--brand-purple);
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.patient-info {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.patient-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--color-text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.2;
}

.patient-procedure {
  font-size: 12px;
  color: var(--color-text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.patient-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════
   9. BADGES & INDICATORS
═══════════════════════════════════════════ */
.days-badge {
  font-size: 11px;
  font-weight: 600;
  color: var(--color-text-secondary);
  background: var(--brand-lavender-light);
  padding: 2px 8px;
  border-radius: var(--r-full);
  white-space: nowrap;
}

.signal-indicator {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--color-text-secondary);
  white-space: nowrap;
}

.signal-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.signal-ok      .signal-dot { background: var(--color-signal-ok); }
.signal-concern .signal-dot { background: var(--color-signal-concern); }
.signal-data    .signal-dot { background: var(--color-signal-data); }
.signal-concern { color: #92400E; }
.signal-none    { color: var(--color-text-tertiary); }

.risk-badge {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .05em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: var(--r-full);
  white-space: nowrap;
  flex-shrink: 0;
}

.risk-high   { background: var(--color-risk-high);   color: #FFFFFF; }
.risk-medium { background: var(--color-risk-medium); color: #FFFFFF; }
.risk-low    { background: var(--color-risk-low);    color: var(--color-risk-low-text); }

@keyframes risk-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,.35); }
  60%       { box-shadow: 0 0 0 5px rgba(192,57,43,0); }
}
.risk-high { animation: risk-pulse 2.4s ease-in-out infinite; }

.silent-badge {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: var(--r-full);
  background: var(--color-silent);
  color: #FFFFFF;
  white-space: nowrap;
  flex-shrink: 0;
}

.risk-badge.badge-lg {
  font-size: 13px;
  padding: 5px 14px;
  letter-spacing: .04em;
}

/* ═══════════════════════════════════════════
   10. DETAIL PANEL
═══════════════════════════════════════════ */
#detail-panel {
  position: fixed;
  right: 0;
  top: var(--fixed-h);
  bottom: 0;
  width: var(--panel-w);
  background: var(--color-bg-surface);
  box-shadow: var(--shadow-panel);
  transform: translateX(100%);
  transition: transform var(--t-normal);
  z-index: 100;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#detail-panel.open { transform: translateX(0); }

.panel-header {
  padding: 18px 20px 16px;
  border-bottom: 1px solid var(--color-border-default);
  flex-shrink: 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  background: var(--color-bg-surface);
}

.panel-header-info { min-width: 0; flex: 1; }

#panel-name {
  font-size: 17px;
  font-weight: 700;
  color: var(--color-text-primary);
  line-height: 1.2;
  letter-spacing: -.02em;
}

#panel-sub {
  font-size: 12px;
  color: var(--color-text-secondary);
  margin-top: 3px;
  line-height: 1.4;
}

.close-btn {
  width: 30px;
  height: 30px;
  border-radius: var(--r-sm);
  color: var(--color-text-tertiary);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--t-fast), color var(--t-fast);
  flex-shrink: 0;
  margin-top: -2px;
}

.close-btn:hover {
  background: var(--color-bg-hover);
  color: var(--color-text-primary);
}

#panel-body {
  flex: 1;
  overflow-y: auto;
  scroll-behavior: smooth;
  overscroll-behavior: contain;
}

.panel-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--color-border-default);
  flex-shrink: 0;
  display: flex;
  gap: 10px;
  background: var(--color-bg-surface);
}

/* ═══════════════════════════════════════════
   11. PANEL SECTIONS
═══════════════════════════════════════════ */
.panel-section {
  padding: 18px 20px;
  border-bottom: 1px solid var(--color-border-default);
}

.panel-section:last-child { border-bottom: none; }

.section-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .09em;
  color: var(--color-text-tertiary);
  margin-bottom: 12px;
}

.silent-banner {
  margin: 16px 20px 0;
  padding: 12px 14px;
  background: var(--color-silent-tint);
  border: 1px solid var(--color-silent-border);
  border-left: 3px solid var(--color-silent);
  border-radius: var(--r-md);
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.silent-banner-icon {
  color: var(--color-silent);
  flex-shrink: 0;
  margin-top: 1px;
}

.silent-banner-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--color-silent-text);
  line-height: 1.3;
}

.silent-banner-sub {
  font-size: 12px;
  color: var(--color-silent);
  margin-top: 2px;
  opacity: .8;
}

/* ═══════════════════════════════════════════
   12. 7-DAY CALENDAR
═══════════════════════════════════════════ */
.cal-squares {
  display: flex;
  gap: 5px;
}

.cal-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  flex: 1;
}

.calendar-square {
  width: 100%;
  aspect-ratio: 1;
  border-radius: var(--r-xs);
  transition: transform var(--t-fast), box-shadow var(--t-fast);
  cursor: default;
  min-width: 32px;
  max-width: 46px;
}

.calendar-square:hover {
  transform: scale(1.08);
  box-shadow: var(--shadow-md);
}

.cal-ok      { background: var(--color-signal-ok); }
.cal-concern { background: var(--color-signal-concern); }
.cal-data    { background: var(--color-signal-data); }
.cal-silent  { background: var(--color-signal-silent); }
.cal-empty   { background: var(--color-signal-empty); }

.cal-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--color-text-tertiary);
  text-align: center;
  white-space: nowrap;
}

.calendar-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 16px;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--color-border-default);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--color-text-secondary);
}

.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════
   13. PANEL CONTENT
═══════════════════════════════════════════ */
.cura-content {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.cura-note {
  font-size: 12px;
  color: var(--color-text-secondary);
  line-height: 1.5;
}

.prom-quote {
  font-size: 13px;
  font-style: italic;
  color: var(--color-text-primary);
  line-height: 1.6;
  padding: 10px 14px;
  background: var(--brand-lavender-light);
  border-left: 3px solid var(--brand-purple);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
}

.prom-meta {
  display: block;
  font-size: 11px;
  color: var(--color-text-tertiary);
  margin-top: 7px;
}

.prom-empty {
  font-size: 13px;
  color: var(--color-text-tertiary);
  font-style: italic;
}

.contact-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.clinician-avatar {
  width: 32px;
  height: 32px;
  border-radius: var(--r-full);
  background: var(--brand-purple-dark);
  color: #FFFFFF;
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.contact-clinician {
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text-primary);
}

.contact-meta {
  font-size: 12px;
  color: var(--color-text-secondary);
}

/* Score factors */
.score-factors {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 10px;
}

.score-factor {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.factor-label {
  font-size: 12px;
  color: var(--color-text-secondary);
}

.factor-bar-wrap {
  flex: 1;
  max-width: 120px;
  height: 6px;
  background: var(--color-border-default);
  border-radius: 3px;
  overflow: hidden;
}

.factor-bar {
  height: 100%;
  border-radius: 3px;
  transition: width .4s ease;
}

.factor-bar.high { background: var(--color-risk-high); }
.factor-bar.medium { background: var(--color-risk-medium); }
.factor-bar.low { background: var(--color-risk-low); }

/* ═══════════════════════════════════════════
   14. BUTTONS
═══════════════════════════════════════════ */
.btn-primary {
  flex: 1;
  height: 40px;
  background: var(--color-accent);
  color: #FFFFFF;
  font-size: 13px;
  font-weight: 600;
  border-radius: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  transition: background var(--t-fast), transform var(--t-fast), opacity var(--t-fast);
}

.btn-primary:hover { background: var(--color-accent-hover); }
.btn-primary:active { transform: scale(.98); }
.btn-primary:disabled { opacity: .7; cursor: not-allowed; }

.btn-primary.btn-calling { background: #2D6A4F; }

.btn-secondary {
  flex: 1;
  height: 40px;
  background: transparent;
  color: var(--color-text-primary);
  font-size: 13px;
  font-weight: 600;
  border-radius: 30px;
  border: 1.5px solid var(--color-border-strong);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  transition: background var(--t-fast), border-color var(--t-fast);
}

.btn-secondary:hover {
  background: var(--color-bg-hover);
  border-color: var(--color-text-secondary);
}

/* ═══════════════════════════════════════════
   15. ANIMATIONS
═══════════════════════════════════════════ */
@keyframes row-in {
  from { opacity: 0; transform: translateX(-8px); }
  to   { opacity: 1; transform: translateX(0); }
}

@media (prefers-reduced-motion: reduce) {
  .patient-row { animation: none; opacity: 1; }
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* ═══════════════════════════════════════════
   16. ACCESSIBILITY
═══════════════════════════════════════════ */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

.patient-row:focus-visible {
  outline: none;
  box-shadow: inset 0 0 0 2px var(--brand-purple);
}

.close-btn:focus-visible,
.btn-primary:focus-visible,
.btn-secondary:focus-visible {
  outline: none;
  box-shadow: var(--shadow-focus);
}

═══════════════════════════════════════════ */
let selectedId = null;
let panelOpen  = false;

const DAY_LABELS  = ['Wed','Thu','Fri','Sat','Sun','Mon','Today'];
const SIGNAL_TIPS = {
  ok:      'All okay',
  concern: 'Reported concern',
  data:    'Vitals submitted',
  silent:  'No response',
  empty:   'Pre-enrollment'
};
const RISK_LABELS = { high: 'High', medium: 'Medium', low: 'Low' };

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function getRiskBadgeHTML(risk, size) {
  const sz = size === 'lg' ? ' badge-lg' : '';
  return '<span class="risk-badge risk-' + risk + sz + '" aria-label="' + RISK_LABELS[risk] + ' priority">' + RISK_LABELS[risk] + '</span>';
}

function getSilentBadgeHTML(hours) {
  return '<span class="silent-badge" aria-label="Silent for ' + hours + ' hours">Silent ' + hours + 'h</span>';
}

function getSignalHTML(p) {
  if (p.silent) {
    return '<span class="signal-indicator signal-none" aria-label="No signal">—</span>';
  }
  if (!p.lastSignalLabel) return '';
  return '<span class="signal-indicator signal-' + p.lastSignalType + '" aria-label="' + p.lastSignalLabel + '">' +
    '<span class="signal-dot" aria-hidden="true"></span>' + p.lastSignalLabel + '</span>';
}

function getCalendarHTML(calendar) {
  var squares = '<div class="cal-squares">';
  for (var i = 0; i < calendar.length; i++) {
    squares += '<div class="cal-item">' +
      '<div class="calendar-square cal-' + calendar[i] + '" title="' + DAY_LABELS[i] + ': ' + SIGNAL_TIPS[calendar[i]] + '" role="img"></div>' +
      '<span class="cal-label">' + DAY_LABELS[i] + '</span></div>';
  }
  squares += '</div>';
  squares += '<div class="calendar-legend">' +
    '<span class="legend-item"><span class="legend-dot cal-ok"></span>All okay</span>' +
    '<span class="legend-item"><span class="legend-dot cal-concern"></span>Concern</span>' +
    '<span class="legend-item"><span class="legend-dot cal-data"></span>Vitals submitted</span>' +
    '<span class="legend-item"><span class="legend-dot cal-silent"></span>No response</span>' +
    '<span class="legend-item"><span class="legend-dot cal-empty"></span>Pre-enrollment</span>' +
    '</div>';
  return squares;
}

function getFactorsHTML(factors) {
  var html = '<div class="score-factors">';
  for (var i = 0; i < factors.length; i++) {
    var f = factors[i];
    html += '<div class="score-factor">' +
      '<span class="factor-label">' + f.label + '</span>' +
      '<div class="factor-bar-wrap"><div class="factor-bar ' + f.level + '" style="width:' + f.pct + '%"></div></div>' +
      '</div>';
  }
  html += '</div>';
  return html;
}

/* ═══════════════════════════════════════════
   RENDER ROWS
═══════════════════════════════════════════ */
function renderRows() {
  var list = document.getElementById('patient-list');
  var html = '';
  for (var i = 0; i < patients.length; i++) {
    var p = patients[i];
    html += '<div class="patient-row' + (p.silent ? ' row-silent' : '') + '" data-id="' + p.id + '" role="button" tabindex="0" style="animation-delay:' + (i * 45) + 'ms">' +
      '<div class="patient-avatar" aria-hidden="true">' + p.initials + '</div>' +
      '<div class="patient-info">' +
        '<span class="patient-name">' + p.name + '</span>' +
        '<span class="patient-procedure">' + p.program + '</span>' +
      '</div>' +
      '<div class="patient-meta">' +
        '<span class="days-badge" title="Week ' + p.week + '">Wk ' + p.week + '</span>' +
        getSignalHTML(p) +
        getRiskBadgeHTML(p.risk, 'sm') +
        (p.silent ? getSilentBadgeHTML(p.silentHours) : '') +
      '</div>' +
    '</div>';
  }
  list.innerHTML = html;

  document.querySelectorAll('.patient-row').forEach(function(row) {
    row.addEventListener('click', function() { selectPatient(+row.dataset.id); });
    row.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectPatient(+row.dataset.id); }
    });
  });
}

/* ═══════════════════════════════════════════
   RENDER PANEL
═══════════════════════════════════════════ */
function renderPanel(p) {
  document.getElementById('panel-name').textContent = p.name;
  document.getElementById('panel-sub').textContent = p.program + ' · Week ' + p.week + ' · Age ' + p.age;

  var html = '';

  if (p.silent) {
    html += '<div class="silent-banner" role="alert">' +
      '<div class="silent-banner-icon" aria-hidden="true">' +
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M8 1L1 14h14L8 1z"/><path d="M8 6v4"/><circle cx="8" cy="12" r=".5" fill="currentColor"/>' +
        '</svg>' +
      '</div>' +
      '<div>' +
        '<div class="silent-banner-title">No CareApp response in ' + p.silentHours + ' hours</div>' +
        '<div class="silent-banner-sub">Last contact: ' + p.lastContact.date + ' via ' + p.lastContact.type.toLowerCase() + '</div>' +
      '</div></div>';
  }

  // 7-day calendar
  html += '<div class="panel-section">' +
    '<h2 class="section-title">7-Day Signal History</h2>' +
    getCalendarHTML(p.calendar) +
    '</div>';

  // Composite triage score
  html += '<div class="panel-section">' +
    '<h2 class="section-title">Composite Triage Score</h2>' +
    '<div class="cura-content">' +
      getRiskBadgeHTML(p.risk, 'lg') +
      '<p class="cura-note">' + p.triageNote + '</p>' +
      getFactorsHTML(p.factors) +
    '</div></div>';

  // PROM / patient voice
  html += '<div class="panel-section">' +
    '<h2 class="section-title">Latest Patient Response</h2>';
  if (p.promResponse) {
    html += '<blockquote class="prom-quote">"' + p.promResponse + '"</blockquote>' +
      '<span class="prom-meta">Today · via CareApp</span>';
  } else {
    html += '<p class="prom-empty">No recent patient-reported responses.</p>';
  }
  html += '</div>';

  // Last contact
  html += '<div class="panel-section">' +
    '<h2 class="section-title">Last Clinical Contact</h2>' +
    '<div class="contact-row">' +
      '<div class="clinician-avatar" aria-hidden="true">' + p.lastContact.initials + '</div>' +
      '<div class="contact-info">' +
        '<span class="contact-clinician">' + p.lastContact.clinician + '</span>' +
        '<span class="contact-meta">' + p.lastContact.date + ' · ' + p.lastContact.type + '</span>' +
      '</div>' +
    '</div></div>';

  document.getElementById('panel-body').innerHTML = html;
  document.getElementById('panel-body').scrollTop = 0;
}

═══════════════════════════════════════════ */
function selectPatient(id) {
  selectedId = id;

  document.querySelectorAll('.patient-row').forEach(function(row) {
    var isSelected = +row.dataset.id === id;
    row.classList.toggle('row-selected', isSelected);
    row.setAttribute('aria-selected', isSelected);
  });

  if (!panelOpen) {
    panelOpen = true;
    document.getElementById('detail-panel').classList.add('open');
    document.getElementById('detail-panel').setAttribute('aria-hidden', 'false');
    document.getElementById('queue-column').classList.add('panel-open');
  }

  var patient = patients.find(function(p) { return p.id === id; });
  renderPanel(patient);

  var btn = document.getElementById('btn-call');
  btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 2h3l1.5 3.5-1.8 1.1a9 9 0 004.7 4.7l1.1-1.8L14 11v3a1 1 0 01-1 1A12 12 0 011 3a1 1 0 011-1z"/></svg>Call Patient';
  btn.classList.remove('btn-calling');
  btn.disabled = false;
}

function closePanel() {
  panelOpen = false;
  selectedId = null;
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('detail-panel').setAttribute('aria-hidden', 'true');
  document.getElementById('queue-column').classList.remove('panel-open');
  document.querySelectorAll('.patient-row').forEach(function(row) {
    row.classList.remove('row-selected');
    row.removeAttribute('aria-selected');
  });
}

function handleCallNow() {
  var btn = document.getElementById('btn-call');
  var patient = patients.find(function(p) { return p.id === selectedId; });
  var first = patient ? patient.name.split(' ')[0] : '';

  btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><circle cx="7" cy="7" r="6" stroke-dasharray="12 26"/></svg>Calling ' + first + '…';
  btn.classList.add('btn-calling');
  btn.disabled = true;

  setTimeout(function() {
    var b = document.getElementById('btn-call');
    if (!b) return;
    b.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 2h3l1.5 3.5-1.8 1.1a9 9 0 004.7 4.7l1.1-1.8L14 11v3a1 1 0 01-1 1A12 12 0 011 3a1 1 0 011-1z"/></svg>Call Patient';
    b.classList.remove('btn-calling');
    b.disabled = false;
  }, 2000);
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function() {
  renderRows();
  document.getElementById('close-panel').addEventListener('click', closePanel);
  document.getElementById('btn-call').addEventListener('click', handleCallNow);
  document.getElementById('btn-note').addEventListener('click', function() {
    var btn = document.getElementById('btn-note');
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7l3.5 3.5L12 3"/></svg>Noted';
    setTimeout(function() {
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 1.5a1.414 1.414 0 012 2L4 11l-3 1 1-3 7.5-7.5z"/></svg>Add Note';
    }, 1800);
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && panelOpen) closePanel();
  });
  selectPatient(1);
});
</script>
</body>
